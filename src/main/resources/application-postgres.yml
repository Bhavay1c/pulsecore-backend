spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pulseboard}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:pulseboard}
    password: ${DB_PASSWORD:pulseboard}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=postgres
# or SPRING_PROFILES_ACTIVE=postgres when running the built jar / Docker container.
