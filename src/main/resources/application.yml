spring:
  application:
    name: pulseboard-checkin
  datasource:
    url: jdbc:h2:mem:pulseboard;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  # Render/Railway/Heroku-style platforms assign a port at runtime via the
  # PORT env var; ${PORT:8080} falls back to 8080 for local/Docker runs
  # where PORT isn't set.
  port: ${PORT:8080}

# Max attendees the check-in desk will admit. Override with
# an environment variable (EVENT_CAPACITY) or a different profile per event.
event:
  capacity: 200

app:
  cors:
    # Comma-separated list, overridable via APP_CORS_ALLOWED_ORIGINS so the
    # deployed frontend's real URL can be added without a code change.
    allowed-origins: http://localhost:5173,http://localhost:3000
