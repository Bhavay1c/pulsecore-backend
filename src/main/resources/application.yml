spring:
  application:
    name: pulseboard-checkin
  datasource:
    url: jdbc:h2:mem:pulseboard;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# Max attendees the check-in desk will admit. Override with
# an environment variable (EVENT_CAPACITY) or a different profile per event.
event:
  capacity: 200
